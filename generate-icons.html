<html><body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  const r = s * 0.15;

  // Background
  ctx.fillStyle = '#111416';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, r);
  ctx.fill();

  // Table icon
  const cx = s / 2, cy = s * 0.42;
  const tw = s * 0.4, th = s * 0.18;
  ctx.fillStyle = '#E7A01E';
  ctx.beginPath();
  ctx.roundRect(cx - tw/2, cy - th/2, tw, th, s*0.03);
  ctx.fill();

  // Legs
  ctx.strokeStyle = '#E7A01E';
  ctx.lineWidth = s * 0.04;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx - tw*0.35, cy + th/2);
  ctx.lineTo(cx - tw*0.35, cy + th/2 + s*0.15);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + tw*0.35, cy + th/2);
  ctx.lineTo(cx + tw*0.35, cy + th/2 + s*0.15);
  ctx.stroke();

  // Text
  ctx.fillStyle = '#f0f0f0';
  ctx.font = `bold ${s*0.09}px Inter, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('WAITER', cx, cy + th/2 + s*0.32);
  ctx.fillStyle = '#E7A01E';
  ctx.fillText('HELPER', cx, cy + th/2 + s*0.42);
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

// Download links
['c192','c512'].forEach(id => {
  const canvas = document.getElementById(id);
  const link = document.createElement('a');
  link.download = `icon-${canvas.width}.png`;
  link.href = canvas.toDataURL('image/png');
  link.textContent = `Download ${canvas.width}`;
  document.body.appendChild(link);
  document.body.appendChild(document.createElement('br'));
});
</script>
</body></html>
